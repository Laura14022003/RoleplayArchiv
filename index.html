<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roleplay Archiv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060709;
      --panel: rgba(12, 13, 17, 0.92);
      --panel-strong: rgba(18, 20, 25, 0.96);
      --panel-soft: rgba(24, 27, 34, 0.88);
      --text: #edf5f2;
      --muted: #9bb0aa;
      --accent: #1e8f7a;
      --accent-strong: #39b59f;
      --accent-soft: rgba(57, 181, 159, 0.16);
      --bubble-in: rgba(33, 36, 42, 0.96);
      --bubble-out: rgba(90, 22, 31, 0.94);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --shadow: 0 20px 44px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(30, 143, 122, 0.15), transparent 28%),
        radial-gradient(circle at bottom right, rgba(133, 36, 47, 0.18), transparent 30%),
        var(--bg);
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 350px 1fr;
    }

    .sidebar {
      position: relative;
      z-index: 2;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(17, 19, 24, 0.96), rgba(10, 11, 14, 0.92)),
        var(--panel);
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(14px);
      min-height: 100vh;
      overflow-y: auto;
    }

    .sidebar-scrim {
      display: none;
    }

    .sidebar-head h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: 0.01em;
    }

    .sidebar-head p {
      margin: 6px 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .sidebar-head {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        rgba(10, 12, 16, 0.8);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sidebar-utility {
      display: grid;
      gap: 10px;
      padding: 6px 0 2px;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      padding: 10px 13px;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      box-shadow: 0 10px 20px rgba(10, 14, 18, 0.2);
    }

    .btn:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .btn:disabled,
    .file-btn.disabled {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn.secondary {
      background: rgba(27, 30, 37, 0.92);
      color: #e7eceb;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .file-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .file-btn input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .chat-list {
      margin-top: 4px;
      display: grid;
      gap: 10px;
      padding-bottom: 8px;
    }

    .chat-list-empty {
      padding: 14px;
      border: 1px dashed #303436;
      border-radius: 12px;
      background: #101114;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .chat-item {
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(24, 26, 31, 0.94), rgba(15, 16, 20, 0.92));
      border-radius: 16px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      transition: border-color 140ms ease, transform 140ms ease, background 140ms ease;
      position: relative;
      overflow: hidden;
    }

    .chat-item::before {
      content: '';
      position: absolute;
      inset: 10px auto 10px 0;
      width: 3px;
      border-radius: 999px;
      background: transparent;
      transition: background 140ms ease;
    }

    .chat-item.active {
      border-color: rgba(57, 181, 159, 0.28);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
      background:
        linear-gradient(180deg, rgba(27, 31, 37, 0.98), rgba(15, 16, 20, 0.94));
    }

    .chat-item.active::before {
      background: linear-gradient(180deg, var(--accent-strong), rgba(255, 255, 255, 0.12));
    }

    .chat-item:hover {
      border-color: var(--line-strong);
    }

    .chat-item h3 {
      margin: 0;
      font-size: 0.98rem;
    }

    .chat-open-content {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .chat-open-text {
      min-width: 0;
      flex: 1 1 auto;
    }

    .chat-open-text h3,
    .chat-open-text p,
    .chat-title-copy h2,
    .chat-title-copy p {
      overflow-wrap: anywhere;
    }

    .chat-avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid #32363a;
      background: #111317 center / cover no-repeat;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #d7e4df;
      font-size: 0.82rem;
      font-weight: 800;
      overflow: hidden;
      text-transform: uppercase;
    }

    .chat-item p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .chat-open {
      border: 0;
      background: transparent;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
      padding: 3px;
      min-width: 0;
    }

    .chat-delete {
      border: 0;
      border-radius: 10px;
      padding: 7px 10px;
      cursor: pointer;
      background: rgba(99, 47, 43, 0.88);
      color: #ffd5d1;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.75rem;
    }

    .chat-delete:hover {
      background: #72403b;
    }

    .chat-view {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(7, 8, 10, 0.82), rgba(4, 5, 7, 0.88));
    }

    .chat-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000;
      overflow: hidden;
      pointer-events: none;
    }

    .chat-backdrop-image {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
    }

    .chat-backdrop-image.visible {
      display: block;
    }

    .chat-header {
      position: sticky;
      top: 0;
      z-index: 3;
      isolation: isolate;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(13, 15, 19, 0.94), rgba(10, 11, 15, 0.88));
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
    }

    .chat-header-info {
      min-width: 0;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      background: rgba(14, 16, 20, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .chat-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .chat-header-avatar {
      width: 44px;
      height: 44px;
      border: 1px solid #32363a;
      border-radius: 999px;
      background: #111317 center / cover no-repeat;
      flex: 0 0 auto;
      cursor: zoom-in;
      display: none;
      padding: 0;
    }

    .chat-header-avatar.visible {
      display: inline-block;
    }

    .chat-title-copy {
      min-width: 0;
      flex: 1 1 auto;
    }

    .chat-description-panel {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .chat-description-panel[hidden] {
      display: none;
    }

    .chat-description-panel p {
      margin: 0;
      color: #d8e3df;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .chat-tools {
      margin-top: 10px;
      display: grid;
      grid-template-columns: minmax(0, 300px) auto;
      gap: 10px;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .search-input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(20, 21, 24, 0.92);
      color: var(--text);
      font: inherit;
      padding: 11px 13px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .search-input:focus-visible,
      .view-select:focus-visible,
      .chat-header-avatar:focus-visible,
      .chat-open:focus-visible,
      .chat-delete:focus-visible,
      .scroll-latest-btn:focus-visible {
      outline: 2px solid rgba(57, 181, 159, 0.45);
      outline-offset: 2px;
    }

    .search-input::placeholder {
      color: #7f8c88;
    }

    .description-input {
      width: 100%;
      min-height: 88px;
      resize: vertical;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #313837;
      border-radius: 999px;
      background: #141518;
      color: var(--muted);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .filter-chip input {
      accent-color: var(--accent-strong);
    }

    .search-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .view-select {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(20, 21, 24, 0.92);
      color: var(--text);
      font: inherit;
      padding: 11px 13px;
      min-width: 170px;
    }

    .search-count {
      min-width: 62px;
      text-align: center;
      color: var(--muted);
      font-size: 0.84rem;
    }

    #chatTitle {
      display: block;
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
    }

    .chat-header p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    #chatMeta:empty {
      display: none;
    }

    .chat-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      background: rgba(14, 16, 20, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    #toggleSidebarBtn {
      display: none;
    }

    #toggleHeaderControlsBtn {
      display: none;
    }

    .messages {
      position: relative;
      z-index: 1;
      padding: 18px 20px 26px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
      align-content: start;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.03), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.01), transparent 18%);
      overflow-x: hidden;
    }

    .messages-empty {
      padding: 20px 18px;
      border: 1px dashed #2d3332;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(16, 17, 20, 0.94), rgba(10, 11, 13, 0.94));
      color: var(--muted);
    }

    .messages-empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 0.98rem;
    }

    .messages-empty span {
      display: block;
      line-height: 1.45;
    }

    .scroll-latest-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 6;
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      background: rgba(18, 20, 24, 0.95);
      color: #f4fbf8;
      box-shadow: var(--shadow);
      cursor: pointer;
      display: none;
      backdrop-filter: blur(10px);
    }

    .scroll-latest-btn.visible {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      touch-action: pan-y;
      width: 100%;
      min-width: 0;
    }

    .message-row.in {
      justify-content: flex-start;
    }

    .message-row.out {
      justify-content: flex-end;
    }

    .message-row.search-current .bubble {
      outline: 2px solid rgba(39, 160, 141, 0.75);
      outline-offset: 2px;
    }

    .message-row.in .marker-toggle {
      order: 2;
    }

    .bubble {
      max-width: min(700px, calc(100% - 36px));
      padding: 10px 12px 8px;
      border-radius: 18px;
      position: relative;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.14);
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .marker-toggle {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      background: rgba(28, 28, 28, 0.92);
      color: #b8b8bc;
      cursor: pointer;
      font: inherit;
      font-size: 1rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      margin-top: 4px;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .marker-toggle:hover {
      background: #625630;
      color: #fff0b1;
    }

    .marker-toggle.active {
      background: #8b7840;
      color: #fff3bf;
    }

    .marker-toggle:active {
      transform: scale(0.96);
    }

    .marker-toggle:focus-visible {
      outline: 2px solid rgba(11, 122, 109, 0.45);
      outline-offset: 2px;
    }

    .message-row.in .bubble {
      background: var(--bubble-in);
      border-top-left-radius: 6px;
    }

    .message-row.out .bubble {
      background: var(--bubble-out);
      border-top-right-radius: 6px;
    }

    .sender {
      margin: 0 0 4px;
      color: #7fd0a0;
      font-weight: 700;
      font-size: 0.79rem;
    }

    .text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.3;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .text strong {
      font-weight: 800;
    }

    .text-code {
      display: inline-block;
      padding: 0.08rem 0.38rem;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.95em;
    }

    .search-hit {
      background: #ffe082;
      color: #241700;
      border-radius: 4px;
      padding: 0 0.08rem;
    }

    .text:empty {
      display: none;
    }

    .media-image {
      display: block;
      width: min(320px, 100%);
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: zoom-in;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .media-missing {
      margin: 0 0 6px;
      font-size: 0.82rem;
      color: #bfd0cb;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 6px 8px;
    }

    .time {
      display: block;
      text-align: right;
      margin-top: 3px;
      color: #9fb1ac;
      font-size: 0.72rem;
    }

    .media-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(6px);
    }

    .media-overlay.open {
      display: flex;
    }

    .media-overlay-inner {
      position: relative;
      max-width: min(92vw, 1200px);
      max-height: 92vh;
    }

    .media-overlay-image {
      display: block;
      max-width: 100%;
      max-height: 92vh;
      border-radius: 14px;
      box-shadow: var(--shadow);
      background: #080808;
    }

    .media-overlay-close {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 0;
      border-radius: 999px;
      width: 38px;
      height: 38px;
      background: rgba(10, 10, 10, 0.8);
      color: #fff;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
    }

    .people-modal {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
    }

    .people-modal.open {
      display: flex;
    }

    .people-panel {
      width: min(720px, 100%);
      max-height: min(86vh, 760px);
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(18, 19, 22, 0.98), rgba(12, 13, 17, 0.96));
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .people-panel h3 {
      margin: 0;
      font-size: 1.08rem;
    }

    .people-panel p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .people-list {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .chat-style-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #262b2b;
      border-radius: 12px;
      background: #0f1012;
    }

    .chat-style-label {
      color: var(--text);
      font-weight: 700;
    }

    .chat-style-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chat-style-file {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .chat-style-file input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .chat-bg-preview {
      margin-top: 10px;
      width: min(100%, 280px);
      aspect-ratio: 16 / 9;
      border: 1px solid #262b2b;
      border-radius: 12px;
      background: #0a0b0d center / cover no-repeat;
    }

    .chat-icon-preview {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      border: 1px solid #262b2b;
      background: #0a0b0d center / cover no-repeat;
    }

    .person-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.2fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #262b2b;
      border-radius: 12px;
      background: #0f1012;
    }

    .person-origin {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .person-input {
      width: 100%;
      border: 1px solid #2d3332;
      border-radius: 10px;
      background: #181a1d;
      color: var(--text);
      font: inherit;
      padding: 9px 10px;
    }

    .person-color {
      width: 44px;
      height: 40px;
      border: 1px solid #2d3332;
      border-radius: 10px;
      background: #181a1d;
      padding: 3px;
      cursor: pointer;
    }

    .people-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .progress-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
    }

    .progress-overlay.open {
      display: flex;
    }

    .progress-panel {
      width: min(420px, 100%);
      padding: 22px 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(18, 19, 22, 0.98), rgba(12, 13, 17, 0.96));
      box-shadow: var(--shadow);
    }

    .progress-panel h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .progress-panel p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .progress-track {
      margin-top: 16px;
      width: 100%;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 180ms ease;
    }

    .progress-fill.indeterminate {
      width: 42%;
      animation: import-progress-slide 1.15s ease-in-out infinite;
    }

    .progress-meta {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    @keyframes import-progress-slide {
      0% {
        transform: translateX(-110%);
      }
      100% {
        transform: translateX(260%);
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 0 12% 0 0;
        transform: translateX(calc(-100% - 24px));
        transition: transform 180ms ease;
        z-index: 8;
        box-shadow: var(--shadow);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        overflow-y: auto;
        visibility: hidden;
        pointer-events: none;
        -webkit-overflow-scrolling: touch;
      }

      .sidebar.open {
        transform: translateX(0);
        visibility: visible;
        pointer-events: auto;
      }

      .sidebar-scrim {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 7;
        background: rgba(0, 0, 0, 0.48);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .sidebar-scrim.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .chat-header {
        align-items: stretch;
        flex-direction: column;
        padding: 12px 12px 12px 14px;
      }

      .sidebar-utility {
        padding: 6px 0 4px;
      }

      .chat-list {
        gap: 12px;
        padding-right: 0;
      }

      .chat-tools {
        grid-template-columns: 1fr;
      }

      .chat-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: stretch;
        position: relative;
        z-index: 1;
      }

      .chat-tools {
        display: none;
      }

      .chat-actions .view-select,
      .chat-actions #renameParticipantsBtn,
      .chat-actions #mergeMediaLabel,
      .chat-actions #jumpMarkerBtn {
        display: none;
      }

      .chat-header.show-controls .chat-tools {
        display: grid;
      }

      .chat-header.show-controls .chat-actions .view-select,
      .chat-header.show-controls .chat-actions #renameParticipantsBtn,
      .chat-header.show-controls .chat-actions #mergeMediaLabel,
      .chat-header.show-controls .chat-actions #jumpMarkerBtn {
        display: block;
        width: 100%;
        min-width: 0;
      }

      .person-row {
        grid-template-columns: 1fr;
      }

      .chat-actions .btn {
        padding: 8px;
        font-size: 0.8rem;
        width: 100%;
        justify-content: center;
      }

      .chat-actions .view-select {
        width: 100%;
        min-width: 0;
      }

      #toggleSidebarBtn {
        display: inline-flex;
        position: relative;
        z-index: 2;
      }

      #toggleHeaderControlsBtn {
        display: inline-flex;
        position: relative;
        z-index: 2;
      }

      .messages {
        padding: 12px 10px 22px;
      }

      .bubble {
        max-width: calc(100% - 34px);
      }

      .scroll-latest-btn {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h1>Roleplay Archiv</h1>
        <p>WhatsApp-Chats zum Nachlesen</p>
      </div>

      <div class="sidebar-utility">
        <input id="chatListSearchInput" class="search-input" type="search" placeholder="Chats schnell finden" />
        <div class="toolbar">
          <label class="btn file-btn">
            Chat importieren
            <input id="chatFileInput" type="file" accept=".txt,.zip" />
          </label>
          <label class="btn secondary file-btn">
            Archiv importieren
            <input id="archiveFileInput" type="file" accept=".json" />
          </label>
          <button class="btn secondary" id="exportArchiveBtn" type="button">Archiv exportieren</button>
        </div>
      </div>

      <nav class="chat-list" id="chatList"></nav>
    </aside>
    <div class="sidebar-scrim" id="sidebarScrim" aria-hidden="true"></div>

    <main class="chat-view" id="chatView">
      <div class="chat-backdrop" id="chatBackdrop" aria-hidden="true">
        <img class="chat-backdrop-image" id="chatBackdropImage" alt="" />
      </div>
      <header class="chat-header">
        <div class="chat-header-info">
          <div class="chat-title-row">
            <button class="chat-header-avatar" id="chatHeaderAvatar" type="button" aria-label="Chat-Icon vergr&ouml;&szlig;ern"></button>
            <div class="chat-title-copy">
              <span id="chatTitle">Kein Chat ausgew&auml;hlt</span>
              <p id="chatMeta">Importiere einen WhatsApp Export (.txt oder .zip)</p>
              <div class="chat-description-panel" id="chatDescriptionPanel" hidden>
                <p id="chatDescriptionText"></p>
              </div>
            </div>
          </div>
          <div class="chat-tools">
            <input id="messageSearchInput" class="search-input" type="search" placeholder="Nach Namen, Begriffen oder Text suchen" />
            <div class="search-nav">
              <button class="btn secondary" id="prevSearchMatchBtn" type="button" disabled>Zur&uuml;ck</button>
              <span class="search-count" id="searchMatchCount">0/0</span>
              <button class="btn secondary" id="nextSearchMatchBtn" type="button" disabled>Weiter</button>
            </div>
          </div>
        </div>
        <div class="chat-actions">
          <button class="btn secondary" id="toggleSidebarBtn" type="button" aria-expanded="false">Chats</button>
          <button class="btn secondary" id="toggleHeaderControlsBtn" type="button" aria-expanded="false">Optionen</button>
          <select class="view-select" id="viewSenderSelect" disabled>
            <option value="">Sicht waehlen</option>
          </select>
          <button class="btn secondary" id="renameParticipantsBtn" type="button" disabled>Design ändern</button>
          <label class="btn secondary file-btn" id="mergeMediaLabel">
            Medien ergänzen
            <input id="mergeMediaInput" type="file" accept=".zip" />
          </label>
          <button class="btn secondary" id="jumpMarkerBtn" type="button" disabled>Zu Marker springen</button>
        </div>
      </header>

      <section class="messages" id="messages"></section>
      <button class="scroll-latest-btn" id="scrollLatestBtn" type="button">Neueste Nachricht</button>
    </main>
  </div>

  <template id="messageTemplate">
    <article class="message-row">
      <button class="marker-toggle" type="button" aria-label="Marker setzen" title="Marker setzen"></button>
      <div class="bubble">
        <p class="sender"></p>
        <p class="text"></p>
        <time class="time"></time>
      </div>
    </article>
  </template>

  <div class="media-overlay" id="mediaOverlay" aria-hidden="true">
    <div class="media-overlay-inner">
      <button class="media-overlay-close" id="closeMediaOverlayBtn" type="button" aria-label="Bildansicht schliessen">&times;</button>
      <img class="media-overlay-image" id="mediaOverlayImage" alt="Vorschau" />
    </div>
  </div>

  <div class="people-modal" id="peopleModal" aria-hidden="true">
    <div class="people-panel">
      <h3>Design ändern</h3>
      <p>Namen, Farben, Ansicht und Hintergrund gelten fuer alle Chats. Nur Chat-Icons bleiben individuell.</p>
      <div class="people-list" id="peopleList"></div>
      <div class="people-actions">
        <button class="btn secondary" id="closePeopleModalBtn" type="button">Abbrechen</button>
        <button class="btn" id="savePeopleBtn" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <div class="progress-overlay" id="progressOverlay" aria-hidden="true">
    <div class="progress-panel" role="status" aria-live="polite">
      <h3 id="progressTitle">Import laeuft</h3>
      <p id="progressDetail">Bitte kurz warten.</p>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-meta">
        <span id="progressStep">Vorbereitung</span>
        <span id="progressPercent">0%</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const storageKey = 'rp-archiv-v1';
    const mediaDbName = 'rp-media-db';
    const mediaStoreName = 'media_assets';
    const appStateStoreName = 'app_state';
    const appStateRecordId = 'state';
    const mediaDbVersion = 2;
    const maxBackgroundImageBytes = 4 * 1024 * 1024;
    const defaultSelfDisplayName = 'Eigene Sicht';
    const defaultOtherDisplayName = 'Andere Person';
    const defaultGlobalDesign = {
      senderColors: {},
      viewSender: '',
      backgroundColor: '',
      backgroundImage: '',
    };
    const state = {
      chats: [],
      selectedChatId: null,
      markerByChat: {},
      globalDesign: { ...defaultGlobalDesign },
      sessionMediaByChat: {},
      mediaLoadInFlight: {},
      peopleEditor: {
        open: false,
      },
      filters: {
        searchTerm: '',
        matchIndex: 0,
      },
      chatListFilter: '',
    };

    const mediaDbPromise = openMediaDb();
    const markerIcons = {
      active: '\u{1F4CC}',
      inactive: '\u{1F4CD}',
    };

    const ui = {
      chatFileInput: document.getElementById('chatFileInput'),
      archiveFileInput: document.getElementById('archiveFileInput'),
      exportArchiveBtn: document.getElementById('exportArchiveBtn'),
      chatListSearchInput: document.getElementById('chatListSearchInput'),
      chatList: document.getElementById('chatList'),
      chatHeaderAvatar: document.getElementById('chatHeaderAvatar'),
      chatTitle: document.getElementById('chatTitle'),
      chatMeta: document.getElementById('chatMeta'),
      chatDescriptionPanel: document.getElementById('chatDescriptionPanel'),
      chatDescriptionText: document.getElementById('chatDescriptionText'),
      messageSearchInput: document.getElementById('messageSearchInput'),
      prevSearchMatchBtn: document.getElementById('prevSearchMatchBtn'),
      nextSearchMatchBtn: document.getElementById('nextSearchMatchBtn'),
      searchMatchCount: document.getElementById('searchMatchCount'),
      messages: document.getElementById('messages'),
      chatBackdrop: document.getElementById('chatBackdrop'),
      chatBackdropImage: document.getElementById('chatBackdropImage'),
      chatView: document.getElementById('chatView'),
      messageTemplate: document.getElementById('messageTemplate'),
      jumpMarkerBtn: document.getElementById('jumpMarkerBtn'),
      viewSenderSelect: document.getElementById('viewSenderSelect'),
      renameParticipantsBtn: document.getElementById('renameParticipantsBtn'),
      mergeMediaInput: document.getElementById('mergeMediaInput'),
      mergeMediaLabel: document.getElementById('mergeMediaLabel'),
      peopleModal: document.getElementById('peopleModal'),
      peopleList: document.getElementById('peopleList'),
      closePeopleModalBtn: document.getElementById('closePeopleModalBtn'),
      savePeopleBtn: document.getElementById('savePeopleBtn'),
      toggleSidebarBtn: document.getElementById('toggleSidebarBtn'),
      toggleHeaderControlsBtn: document.getElementById('toggleHeaderControlsBtn'),
      sidebar: document.getElementById('sidebar'),
      sidebarScrim: document.getElementById('sidebarScrim'),
      mediaOverlay: document.getElementById('mediaOverlay'),
      mediaOverlayImage: document.getElementById('mediaOverlayImage'),
      closeMediaOverlayBtn: document.getElementById('closeMediaOverlayBtn'),
      scrollLatestBtn: document.getElementById('scrollLatestBtn'),
      progressOverlay: document.getElementById('progressOverlay'),
      progressTitle: document.getElementById('progressTitle'),
      progressDetail: document.getElementById('progressDetail'),
      progressFill: document.getElementById('progressFill'),
      progressStep: document.getElementById('progressStep'),
      progressPercent: document.getElementById('progressPercent'),
    };

    boot().catch(console.error);

    async function boot() {
      await loadPersistedState();
      bindEvents();
      renderChatList();
      if (state.chats.length > 0) {
        await selectChat(state.chats[0].id);
      } else {
        renderSelectedChat();
      }
    }

    function bindEvents() {
      ui.chatFileInput.addEventListener('change', handleImportFile);
      ui.archiveFileInput.addEventListener('change', handleArchiveImportFile);
      ui.exportArchiveBtn.addEventListener('click', exportArchiveFile);
      ui.chatListSearchInput.addEventListener('input', (event) => {
        state.chatListFilter = String(event.target.value || '');
        renderChatList();
      });
      ui.jumpMarkerBtn.addEventListener('click', jumpToMarker);
      ui.mergeMediaInput.addEventListener('change', handleMergeMediaFile);
      ui.chatHeaderAvatar.addEventListener('click', () => {
        const chat = getSelectedChat();
        const chatIcon = normalizeChatIcon(chat?.chatIcon);
        if (!chatIcon) return;
        openMediaOverlay(chatIcon, `${chat?.title || 'Chat'} Icon`);
      });
      ui.viewSenderSelect.addEventListener('change', () => {
        saveViewSenderForSelectedChat(ui.viewSenderSelect.value).catch(console.error);
      });
      ui.renameParticipantsBtn.addEventListener('click', () => {
        openPeopleEditor();
      });
      ui.closePeopleModalBtn.addEventListener('click', closePeopleEditor);
      ui.savePeopleBtn.addEventListener('click', () => {
        savePeopleEditor().catch((error) => {
          console.error(error);
          alert(`Design konnte nicht gespeichert werden: ${error.message}`);
        });
      });
      ui.peopleModal.addEventListener('click', (event) => {
        if (event.target === ui.peopleModal) {
          closePeopleEditor();
        }
      });
      ui.messageSearchInput.addEventListener('input', (event) => {
        state.filters.searchTerm = event.target.value || '';
        state.filters.matchIndex = 0;
        renderSelectedChat();
      });
      ui.messages.addEventListener('scroll', syncScrollLatestButton);
      ui.scrollLatestBtn.addEventListener('click', () => {
        ui.messages.scrollTo({ top: ui.messages.scrollHeight, behavior: 'smooth' });
      });
      ui.prevSearchMatchBtn.addEventListener('click', () => {
        moveSearchMatch(-1);
      });
      ui.nextSearchMatchBtn.addEventListener('click', () => {
        moveSearchMatch(1);
      });
      bindTap(ui.toggleSidebarBtn, () => {
        toggleSidebarPanel();
      });
      bindTap(ui.toggleHeaderControlsBtn, () => {
        toggleHeaderControls();
      });
      bindTap(ui.sidebarScrim, () => {
        closeSidebarPanel();
      });
      ui.closeMediaOverlayBtn.addEventListener('click', closeMediaOverlay);
      ui.mediaOverlay.addEventListener('click', (event) => {
        if (event.target === ui.mediaOverlay) {
          closeMediaOverlay();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && ui.peopleModal.classList.contains('open')) {
          closePeopleEditor();
          return;
        }
        if (event.key === 'Escape' && ui.mediaOverlay.classList.contains('open')) {
          closeMediaOverlay();
        }
      });
    }

    function bindTap(element, handler) {
      if (!element) return;

      let lastTouchAt = 0;

      element.addEventListener('touchend', (event) => {
        lastTouchAt = Date.now();
        event.preventDefault();
        handler(event);
      }, { passive: false });

      element.addEventListener('click', (event) => {
        if (Date.now() - lastTouchAt < 700) return;
        handler(event);
      });
    }

    function closeSidebarPanel() {
      ui.sidebar.classList.remove('open');
      ui.sidebarScrim.classList.remove('visible');
      ui.toggleSidebarBtn.setAttribute('aria-expanded', 'false');
    }

    function toggleSidebarPanel(force) {
      const nextState = typeof force === 'boolean' ? force : !ui.sidebar.classList.contains('open');
      if (nextState) {
        closeHeaderControls();
      }

      ui.sidebar.classList.toggle('open', nextState);
      ui.sidebarScrim.classList.toggle('visible', nextState);
      ui.toggleSidebarBtn.setAttribute('aria-expanded', String(nextState));
    }

    function closeHeaderControls() {
      const header = ui.chatView.querySelector('.chat-header');
      header.classList.remove('show-controls');
      ui.toggleHeaderControlsBtn.setAttribute('aria-expanded', 'false');
      ui.toggleHeaderControlsBtn.textContent = 'Optionen';
    }

    function normalizeChatDescription(value) {
      return typeof value === 'string' ? value.trim() : '';
    }

    function syncChatDescription(chat) {
      const description = normalizeChatDescription(chat?.description);
      ui.chatDescriptionText.textContent = description;
      ui.chatDescriptionPanel.hidden = !description;
    }

    function toggleHeaderControls(force) {
      const header = ui.chatView.querySelector('.chat-header');
      const nextState = typeof force === 'boolean' ? force : !header.classList.contains('show-controls');
      if (nextState) {
        closeSidebarPanel();
      }

      header.classList.toggle('show-controls', nextState);
      ui.toggleHeaderControlsBtn.setAttribute('aria-expanded', String(nextState));
      ui.toggleHeaderControlsBtn.textContent = nextState ? 'Schliessen' : 'Optionen';
    }

    async function handleImportFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        showProgress({
          title: 'Import laeuft',
          detail: `${file.name} wird vorbereitet...`,
          step: 'Start',
          percent: 4,
        });
        if (/\.zip$/i.test(file.name)) {
          await importFromZip(file);
        } else {
          await importFromTxt(file);
        }
        updateProgress({
          detail: `${file.name} wurde importiert.`,
          step: 'Abgeschlossen',
          percent: 100,
        });
      } catch (error) {
        console.error(error);
        alert(`Import fehlgeschlagen: ${error.message}`);
      } finally {
        hideProgress();
        ui.chatFileInput.value = '';
      }
    }

    async function importFromTxt(file) {
      updateProgress({
        detail: `${file.name} wird gelesen...`,
        step: 'Datei lesen',
        percent: 18,
      });
      const content = await file.text();
      updateProgress({
        detail: 'Nachrichten werden erkannt...',
        step: 'Nachrichten parsen',
        percent: 48,
      });
      const messages = parseWhatsAppExport(content, {});
      if (messages.length === 0) {
        alert('Keine Nachrichten erkannt. Bitte WhatsApp .txt oder .zip Export nutzen.');
        return;
      }

      const now = new Date().toISOString();
      const chat = {
        id: crypto.randomUUID(),
        title: sanitizeChatTitle(file.name.replace(/\.txt$/i, '')),
        description: '',
        createdAt: now,
        updatedAt: now,
        messages,
      };

      updateProgress({
        detail: 'Chat wird lokal gespeichert...',
        step: 'Speichern',
        percent: 82,
      });
      await addChatToState(chat);
    }

    async function importFromZip(file) {
      const chatId = crypto.randomUUID();
      updateProgress({
        detail: `${file.name} wird entpackt...`,
        step: 'ZIP lesen',
        indeterminate: true,
      });
      const bundle = await readWhatsAppZipBundle(file, createProgressReporter(8, 44));
      updateProgress({
        detail: 'Nachrichten werden aus der ZIP gelesen...',
        step: 'Nachrichten parsen',
        percent: 56,
      });
      const mediaIndex = await persistMediaBundleForChat(chatId, bundle.mediaBundle, null, createProgressReporter(56, 84, 'Medien speichern'));
      const messages = parseWhatsAppExport(bundle.content, mediaIndex);

      if (messages.length === 0) {
        throw new Error('Nachrichten konnten aus der ZIP nicht gelesen werden.');
      }

      const now = new Date().toISOString();
      const chat = {
        id: chatId,
        title: sanitizeChatTitle(file.name.replace(/\.zip$/i, '')),
        description: '',
        createdAt: now,
        updatedAt: now,
        messages,
      };

      state.sessionMediaByChat[chat.id] = mediaIndex;
      updateProgress({
        detail: 'Chat wird lokal gespeichert...',
        step: 'Speichern',
        percent: 92,
      });
      await addChatToState(chat);
    }

    async function handleMergeMediaFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        showProgress({
          title: 'Medien werden ergänzt',
          detail: `${file.name} wird vorbereitet...`,
          step: 'Start',
          percent: 4,
        });
        if (!/\.zip$/i.test(file.name)) {
          throw new Error('Zum Medien-Abgleich bitte einen WhatsApp ZIP-Export mit Medien auswaehlen.');
        }
        const chat = getSelectedChat();
        if (!chat) {
          throw new Error('Bitte zuerst den Chat auswaehlen, dem die Medien hinzugefuegt werden sollen.');
        }
        await mergeMediaFromZipIntoSelectedChat(file, chat);
        updateProgress({
          detail: 'Die Medien wurden erfolgreich ergänzt.',
          step: 'Abgeschlossen',
          percent: 100,
        });
      } catch (error) {
        console.error(error);
        alert(`Medien konnten nicht ergänzt werden: ${error.message}`);
      } finally {
        hideProgress();
        ui.mergeMediaInput.value = '';
      }
    }

    async function mergeMediaFromZipIntoSelectedChat(file, chat) {
      updateProgress({
        detail: `${file.name} wird entpackt...`,
        step: 'ZIP lesen',
        indeterminate: true,
      });
      const bundle = await readWhatsAppZipBundle(file, createProgressReporter(6, 38));
      updateProgress({
        detail: 'Bildnachrichten werden abgeglichen...',
        step: 'Zuordnen',
        percent: 52,
      });
      const importedMessages = parseWhatsAppExport(bundle.content, bundle.mediaBundle.mediaIndex);
      if (importedMessages.length === 0) {
        bundle.mediaBundle.revokeAll();
        throw new Error('Im Zusatz-Export wurden keine Nachrichten erkannt.');
      }

      const result = await mergeImportedMediaIntoChat(chat, importedMessages, bundle.mediaBundle, createProgressReporter(52, 86, 'Medien speichern'));
      if (result.mergedCount === 0) {
        throw new Error('Es konnten keine passenden Bildnachrichten zum bestehenden Chat zugeordnet werden.');
      }

      chat.updatedAt = new Date().toISOString();
      updateProgress({
        detail: 'Aktualisierter Chat wird lokal gespeichert...',
        step: 'Speichern',
        percent: 92,
      });
      await persistAppState();
      renderSelectedChat();
      alert(`${result.mergedCount} Bild${result.mergedCount === 1 ? '' : 'er'} ergänzt. ${result.enrichedMessages} Nachricht${result.enrichedMessages === 1 ? '' : 'en'} wurden aktualisiert.`);
    }

    async function readWhatsAppZipBundle(file, reportProgress = null) {
      if (!window.JSZip) {
        throw new Error('JSZip nicht geladen. Bitte Internetzugang fuer CDN pruefen.');
      }

      const zip = await window.JSZip.loadAsync(await file.arrayBuffer());
      const files = Object.values(zip.files).filter((entry) => !entry.dir);
      const textEntry = pickWhatsAppTextEntry(files);

      if (!textEntry) {
        throw new Error('Im ZIP wurde keine WhatsApp .txt Datei gefunden (z.B. _chat.txt).');
      }

      return {
        content: await textEntry.async('string'),
        mediaBundle: await extractImageMediaBundle(zip, files, reportProgress),
      };
    }

    async function addChatToState(chat) {
      state.chats.unshift(chat);
      await persistAppState();
      renderChatList();
      await selectChat(chat.id);
    }

    function pickWhatsAppTextEntry(files) {
      const textFiles = files
        .filter((entry) => /\.txt$/i.test(entry.name))
        .filter((entry) => !entry.name.startsWith('__MACOSX/'));

      if (textFiles.length === 0) return null;

      const preferred = textFiles.find((entry) => /(^|\/)_chat\.txt$/i.test(entry.name));
      return preferred || textFiles[0];
    }

    async function extractImageMediaBundle(zip, files, reportProgress = null) {
      const mediaIndex = {};
      const mediaBlobs = {};
      const createdUrlsByKey = {};
      const imageEntries = files.filter((entry) => isImageFile(entry.name) && !entry.name.startsWith('__MACOSX/'));
      const totalImages = imageEntries.length;
      let processedImages = 0;

      for (const entry of imageEntries) {
        const blob = await zip.file(entry.name).async('blob');
        const url = URL.createObjectURL(blob);
        const normalizedPath = normalizeMediaKey(entry.name);
        const normalizedBase = normalizeMediaKey(basename(entry.name));

        mediaIndex[normalizedPath] = url;
        mediaIndex[normalizedBase] = url;
        mediaBlobs[normalizedPath] = blob;
        mediaBlobs[normalizedBase] = blob;
        createdUrlsByKey[normalizedPath] = url;
        createdUrlsByKey[normalizedBase] = url;
        processedImages += 1;
        reportProgress?.(processedImages, totalImages, totalImages === 1 ? '1 Bild vorbereitet' : `${processedImages}/${totalImages} Bilder vorbereitet`);
      }

      return {
        mediaIndex,
        mediaBlobs,
        revokeUnused(usedKeys) {
          const keep = new Set(Array.from(usedKeys || [], (key) => normalizeMediaKey(key)));
          const revokedUrls = new Set();
          for (const [mediaKey, url] of Object.entries(createdUrlsByKey)) {
            if (keep.has(mediaKey) || revokedUrls.has(url)) continue;
            URL.revokeObjectURL(url);
            revokedUrls.add(url);
          }
        },
        revokeAll() {
          const revokedUrls = new Set();
          for (const url of Object.values(createdUrlsByKey)) {
            if (revokedUrls.has(url)) continue;
            URL.revokeObjectURL(url);
            revokedUrls.add(url);
          }
        },
      };
    }

    async function persistMediaBundleForChat(chatId, mediaBundle, keyFilter = null, reportProgress = null) {
      const nextIndex = {};
      const allowedKeys = keyFilter ? new Set(Array.from(keyFilter, (key) => normalizeMediaKey(key))) : null;
      const entries = Object.entries(mediaBundle.mediaBlobs || {})
        .filter(([mediaKey]) => {
          const normalizedKey = normalizeMediaKey(mediaKey);
          return !allowedKeys || allowedKeys.has(normalizedKey);
        });
      const totalEntries = entries.length;
      let processedEntries = 0;
      for (const [mediaKey, blob] of entries) {
        const normalizedKey = normalizeMediaKey(mediaKey);
        await persistMediaBlob(chatId, normalizedKey, blob);
        nextIndex[normalizedKey] = mediaBundle.mediaIndex[normalizedKey] || URL.createObjectURL(blob);
        processedEntries += 1;
        reportProgress?.(processedEntries, totalEntries, totalEntries === 0 ? 'Keine Medien' : `${processedEntries}/${totalEntries} Medien gespeichert`);
      }
      return nextIndex;
    }

    function isImageFile(fileName) {
      return /\.(jpe?g|png|gif|webp|bmp|heic|heif)$/i.test(fileName);
    }

    function parseWhatsAppExport(content, mediaIndex) {
      const lines = content.split(/\r?\n/);
      const messages = [];
      const pattern = /^(?:\u200e|\u200f)?(?:\[)?(\d{1,2}[./]\d{1,2}[./]\d{2,4}),\s(\d{1,2}:\d{2}(?::\d{2})?)(?:\])?\s(?:-\s)?([^:]+):\s([\s\S]*)$/;
      let current = null;

      for (const line of lines) {
        const match = line.match(pattern);
        if (match) {
          const [, datePart, timePart, senderRaw, text] = match;
          current = {
            sender: senderRaw.trim(),
            text: (text || '').trim(),
            sentAt: parseLocalDate(datePart, timePart),
          };
          messages.push(current);
          continue;
        }

        if (current) {
          current.text += `\n${line}`;
        }
      }

      return messages.map((message, index) => enrichMessageWithMedia(message, index + 1, mediaIndex));
    }

    function enrichMessageWithMedia(message, seq, mediaIndex) {
      const mediaName = extractMediaReference(message.text);
      if (!mediaName) {
        return {
          ...message,
          seq,
          text: cleanupEditedMessageNotice(message.text),
        };
      }

      return {
        ...message,
        seq,
        text: cleanupMediaDisplayText(message.text, mediaName),
        mediaName,
        mediaType: inferMediaType(mediaName),
        hasMedia: Boolean(resolveMediaUrl(mediaName, mediaIndex)),
      };
    }

    function extractMediaReference(text) {
      if (!text) return null;

      const clean = text.replace(/[\u200e\u200f]/g, '');
      const matches = [
        clean.match(/<(?:Anhang|attached):\s*([^>]+)>/i),
        clean.match(/(?:\bDatei angeh(?:\u00e4ngt|aengt):\s*|\bFile attached:\s*)([^\n]+)/i),
        clean.match(/\b([A-Z]{3}-\d{8}-WA\d{4}\.[a-z0-9]{3,5})\b/i),
        clean.match(/\b([^\s<>:"/\\|?*]+\.(?:jpe?g|png|gif|webp|bmp|heic|heif))\b/i),
      ];

      for (const match of matches) {
        if (match?.[1]) {
          return match[1].replace(/[\u200e\u200f]/g, '').trim();
        }
      }

      return null;
    }

    function cleanupMediaMarkerText(text, mediaName) {
      let cleaned = text.replace(/[\u200e\u200f]/g, '');
      cleaned = cleaned.replace(new RegExp(`<\\s*(?:Anhang|attached):\\s*${escapeRegExp(mediaName)}\\s*>`, 'i'), '');
      cleaned = cleaned.replace(/\((?:Datei angeh(?:\u00e4ngt|aengt)|File attached)\)/gi, '');
      cleaned = cleaned.replace(/(?:Datei angeh(?:\u00e4ngt|aengt):|File attached:)\s*[^\n]+/gi, '');
      cleaned = cleaned.replace(/<\s*(?:Medien ausgeschlossen|Media omitted)\s*>/gi, '');
      cleaned = cleaned.replace(/\b(?:Anhang ausgelassen|Medien ausgeschlossen|Media omitted)\b/gi, '');
      cleaned = cleaned.replace(/^[\s,-]+|[\s,-]+$/g, '');
      return cleaned.trim();
    }

    function cleanupMediaDisplayText(text, mediaName) {
      const cleaned = cleanupMediaMarkerText(text, mediaName);
      if (!cleaned) return '';

      return cleanupEditedMessageNotice(cleaned
        .replace(/[\u200e\u200f]/g, '')
        .replace(new RegExp(`^${escapeRegExp(mediaName)}(?:\\s*\\n+|\\s*$)`, 'i'), '')
        .replace(new RegExp(`(^|[\\s\\n])${escapeRegExp(mediaName)}(?=[\\s\\n]|$)`, 'gi'), '$1')
        .replace(/\n{3,}/g, '\n\n')
        .replace(/^[\s,-]+|[\s,-]+$/g, '')
        .trim());
    }

    function cleanupEditedMessageNotice(text) {
      return String(text || '')
        .replace(/[\u200e\u200f]/g, '')
        .replace(/\s*<\s*(?:Diese Nachricht wurde bearbeitet\.?|This message was edited\.?)\s*>\s*$/i, '')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function inferMediaType(mediaName) {
      if (/\.(jpe?g|png|gif|webp|bmp|heic|heif)$/i.test(mediaName)) {
        return 'image';
      }
      return 'file';
    }

    function resolveMediaUrl(mediaName, mediaIndex) {
      const exact = mediaIndex[normalizeMediaKey(mediaName)];
      if (exact) return exact;
      return mediaIndex[normalizeMediaKey(basename(mediaName))] || '';
    }

    function normalizeMediaKey(value) {
      return String(value || '').replaceAll('\\', '/').trim().toLowerCase();
    }

    function basename(path) {
      return String(path || '').replaceAll('\\', '/').split('/').pop() || path;
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function sanitizeChatTitle(title) {
      return String(title || '')
        .replace(/^WhatsApp-Chat mit\s*/i, '')
        .trim();
    }

    function normalizeStoredMessage(message) {
      return {
        ...message,
        text: cleanupEditedMessageNotice(message?.text),
      };
    }

    function normalizeChatBackground(value) {
      return typeof value === 'string' && /^#[0-9a-f]{6}$/i.test(value) ? value : '';
    }

    function normalizeChatBackgroundImage(value) {
      return typeof value === 'string' && /^data:/i.test(value) ? value : '';
    }

    function normalizeChatIcon(value) {
      return typeof value === 'string' && /^data:/i.test(value) ? value : '';
    }

    function normalizeSenderColors(senderColors, senders) {
      const normalized = {};
      for (const sender of senders) {
        const color = senderColors?.[sender];
        if (typeof color === 'string' && /^#[0-9a-f]{6}$/i.test(color)) {
          normalized[sender] = color;
        }
      }
      return normalized;
    }

    function getAllSenders(chats) {
      return Array.from(new Set((chats || [])
        .flatMap((chat) => getChatSenders(chat))
        .filter(Boolean)));
    }

    function getChatSenders(chat) {
      return Array.from(new Set((chat?.messages || []).map((message) => String(message?.sender || '').trim()).filter(Boolean)));
    }

    function getPreferredViewSender(chat) {
      const senders = getChatSenders(chat);
      if (senders.length === 0) return '';
      return senders.includes(state.globalDesign.viewSender) ? state.globalDesign.viewSender : senders[0];
    }

    function buildPeopleEditorNameMap(chat) {
      const ownSender = getPreferredViewSender(chat);
      const nameMap = new Map();

      for (const sender of getAllSenders(state.chats)) {
        nameMap.set(sender, sender === ownSender ? defaultSelfDisplayName : defaultOtherDisplayName);
      }

      return nameMap;
    }

    function buildPeopleEditorGroups(chat) {
      const suggestedNames = buildPeopleEditorNameMap(chat);
      const groups = new Map();

      for (const sender of getAllSenders(state.chats)) {
        const targetName = suggestedNames.get(sender) || sender;
        if (!groups.has(targetName)) {
          groups.set(targetName, {
            suggestedName: targetName,
            originalSenders: [],
          });
        }

        groups.get(targetName).originalSenders.push(sender);
      }

      return Array.from(groups.values());
    }

    function normalizeGlobalDesign(globalDesign, chats) {
      const senders = getAllSenders(chats);
      return {
        senderColors: normalizeSenderColors(globalDesign?.senderColors, senders),
        viewSender: typeof globalDesign?.viewSender === 'string' ? globalDesign.viewSender.trim() : '',
        backgroundColor: normalizeChatBackground(globalDesign?.backgroundColor),
        backgroundImage: normalizeChatBackgroundImage(globalDesign?.backgroundImage),
      };
    }

    function deriveGlobalDesignFromChats(chats) {
      const mergedSenderColors = {};
      let viewSender = '';
      let backgroundColor = '';
      let backgroundImage = '';
      for (const chat of chats || []) {
        Object.assign(mergedSenderColors, chat?.senderColors || {});
        if (!viewSender && typeof chat?.viewSender === 'string' && chat.viewSender.trim()) {
          viewSender = chat.viewSender.trim();
        }
        if (!backgroundColor && normalizeChatBackground(chat?.backgroundColor)) {
          backgroundColor = normalizeChatBackground(chat.backgroundColor);
        }
        if (!backgroundImage && normalizeChatBackgroundImage(chat?.backgroundImage)) {
          backgroundImage = normalizeChatBackgroundImage(chat.backgroundImage);
        }
      }
      return normalizeGlobalDesign({
        senderColors: mergedSenderColors,
        viewSender,
        backgroundColor,
        backgroundImage,
      }, chats);
    }

    function normalizeChats(chats) {
      return chats.map((chat) => ({
        ...chat,
        title: sanitizeChatTitle(chat?.title) || 'Unbenannter Chat',
        description: normalizeChatDescription(chat?.description),
        messages: Array.isArray(chat?.messages) ? chat.messages.map(normalizeStoredMessage) : [],
        chatIcon: normalizeChatIcon(chat?.chatIcon),
      }));
    }

    function getSenderColor(chat, sender) {
      return state.globalDesign.senderColors?.[sender] || '';
    }

    function applyChatBackground(chat) {
      const backgroundColor = normalizeChatBackground(state.globalDesign.backgroundColor);
      const backgroundImage = normalizeChatBackgroundImage(state.globalDesign.backgroundImage);
      ui.chatBackdrop.style.backgroundColor = backgroundColor || '#000000';
      ui.chatBackdropImage.src = backgroundImage || '';
      ui.chatBackdropImage.classList.toggle('visible', Boolean(backgroundImage));
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('Datei konnte nicht gelesen werden.'));
        reader.readAsDataURL(file);
      });
    }

    function validateBackgroundImageFile(file) {
      if (!file) return;
      if (!String(file.type || '').startsWith('image/')) {
        throw new Error('Bitte ein Bildformat wie JPG, PNG oder WebP auswaehlen.');
      }
      if (file.size > maxBackgroundImageBytes) {
        throw new Error('Das Hintergrundbild ist zu gross. Bitte ein Bild unter 4 MB verwenden.');
      }
    }

    function validateChatIconFile(file) {
      if (!file) return;
      if (!String(file.type || '').startsWith('image/')) {
        throw new Error('Bitte ein Bildformat wie JPG, PNG oder WebP fuer das Chat-Icon auswaehlen.');
      }
      if (file.size > 1024 * 1024) {
        throw new Error('Das Chat-Icon ist zu gross. Bitte ein Bild unter 1 MB verwenden.');
      }
    }

    function getChatInitials(title) {
      const parts = String(title || '')
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2);
      if (parts.length === 0) return '?';
      return parts.map((part) => part[0] || '').join('').toUpperCase();
    }

    function normalizeMessageMatchText(text) {
      return String(text || '')
        .replace(/<\s*(?:medien ausgeschlossen|media omitted)\s*>/gi, '')
        .replace(/\((?:datei angeh(?:ängt|aengt)|file attached)\)/gi, '')
        .replace(/<\s*(?:anhang|attached)\s*:\s*[^>]+>/gi, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLocaleLowerCase('de-DE');
    }

    function getMessageSignature(message) {
      return `${message?.sentAt || ''}|${normalizeMessageMatchText(message?.text)}`;
    }

    function getMessageTimeKey(message) {
      return String(message?.sentAt || '');
    }

    function getMessageMinuteKey(message) {
      const iso = String(message?.sentAt || '');
      return iso ? iso.slice(0, 16) : '';
    }

    function messageHasResolvedImage(chatId, message) {
      if (message?.mediaType !== 'image' || !message?.mediaName) return false;
      return Boolean(resolveMediaUrl(message.mediaName, state.sessionMediaByChat[chatId] || {}));
    }

    function pickMergeCandidate(chatId, candidates, claimedExistingIndexes, importedMessage) {
      const importedText = normalizeMessageMatchText(importedMessage.text);
      const available = (candidates || []).filter((entry) => !claimedExistingIndexes.has(entry.index));
      if (available.length === 0) return null;

      const unresolved = available.filter((entry) => !messageHasResolvedImage(chatId, entry.message));
      const preferredPool = unresolved.length > 0 ? unresolved : available;
      const exactText = preferredPool.filter((entry) => normalizeMessageMatchText(entry.message.text) === importedText);
      if (exactText.length > 0) return exactText[0];
      return preferredPool[0];
    }

    async function mergeImportedMediaIntoChat(chat, importedMessages, mediaBundle) {
      const existingEntries = chat.messages.map((message, index) => ({ message, index }));
      const exactBuckets = new Map();
      const timeBuckets = new Map();
      const minuteBuckets = new Map();

      for (const entry of existingEntries) {
        const signature = getMessageSignature(entry.message);
        const timeKey = getMessageTimeKey(entry.message);
        const minuteKey = getMessageMinuteKey(entry.message);
        if (!exactBuckets.has(signature)) exactBuckets.set(signature, []);
        if (!timeBuckets.has(timeKey)) timeBuckets.set(timeKey, []);
        if (!minuteBuckets.has(minuteKey)) minuteBuckets.set(minuteKey, []);
        exactBuckets.get(signature).push(entry);
        timeBuckets.get(timeKey).push(entry);
        minuteBuckets.get(minuteKey).push(entry);
      }

      const claimedExistingIndexes = new Set();
      const claimedMediaKeys = new Set();
      let mergedCount = 0;
      let enrichedMessages = 0;

      for (const importedMessage of importedMessages) {
        if (importedMessage.mediaType !== 'image' || !importedMessage.mediaName) continue;
        if (!resolveMediaUrl(importedMessage.mediaName, mediaBundle.mediaIndex)) continue;

        const exactCandidates = exactBuckets.get(getMessageSignature(importedMessage)) || [];
        let matchedEntry = pickMergeCandidate(chat.id, exactCandidates, claimedExistingIndexes, importedMessage);

        if (!matchedEntry) {
          const timeCandidates = timeBuckets.get(getMessageTimeKey(importedMessage)) || [];
          matchedEntry = pickMergeCandidate(chat.id, timeCandidates, claimedExistingIndexes, importedMessage);
        }

        if (!matchedEntry) {
          const minuteCandidates = minuteBuckets.get(getMessageMinuteKey(importedMessage)) || [];
          matchedEntry = pickMergeCandidate(chat.id, minuteCandidates, claimedExistingIndexes, importedMessage);
        }

        if (!matchedEntry) {
          continue;
        }

        claimedExistingIndexes.add(matchedEntry.index);
        const targetMessage = matchedEntry.message;
        const targetKey = normalizeMediaKey(importedMessage.mediaName);
        const hadResolvedImage = messageHasResolvedImage(chat.id, targetMessage);
        if (!hadResolvedImage) {
          const changedMetadata = targetMessage.mediaName !== importedMessage.mediaName
            || targetMessage.mediaType !== importedMessage.mediaType
            || !targetMessage.hasMedia;
          targetMessage.text = cleanupMediaDisplayText(targetMessage.text || importedMessage.text || '', importedMessage.mediaName);
          targetMessage.mediaName = importedMessage.mediaName;
          targetMessage.mediaType = importedMessage.mediaType;
          targetMessage.hasMedia = true;
          if (changedMetadata) {
            enrichedMessages += 1;
          }
          claimedMediaKeys.add(targetKey);
          claimedMediaKeys.add(normalizeMediaKey(basename(importedMessage.mediaName)));
        } else if (!targetMessage.hasMedia) {
          targetMessage.hasMedia = true;
          enrichedMessages += 1;
        }
      }

      if (claimedMediaKeys.size === 0) {
        mediaBundle.revokeAll();
        return { mergedCount, enrichedMessages };
      }

      const persistedIndex = await persistMediaBundleForChat(chat.id, mediaBundle, claimedMediaKeys);
      mediaBundle.revokeUnused(claimedMediaKeys);
      const currentSessionIndex = state.sessionMediaByChat[chat.id] || {};
      state.sessionMediaByChat[chat.id] = {
        ...currentSessionIndex,
        ...persistedIndex,
      };
      mergedCount = Object.keys(persistedIndex).length > 0
        ? new Set(Object.values(persistedIndex)).size
        : 0;
      return { mergedCount, enrichedMessages };
    }

    function matchesMessageSearch(message, searchTerm) {
      if (!searchTerm) return true;
      const haystack = [
        message?.sender || '',
        message?.text || '',
        message?.mediaName || '',
      ].join('\n').toLocaleLowerCase('de-DE');
      return haystack.includes(searchTerm.toLocaleLowerCase('de-DE'));
    }

    function getFilteredMessages(chat) {
      return (chat?.messages || []).filter((message) => matchesMessageSearch(message, state.filters.searchTerm));
    }

    function buildChatMeta(chat, visibleCount) {
      const details = [];
      if (state.filters.searchTerm) {
        details.push(`${visibleCount} sichtbar`);
      }
      if (state.filters.searchTerm) {
        details.push(`Suche: "${state.filters.searchTerm}"`);
      }
      return details.join(' • ');
    }

    function syncScrollLatestButton() {
      const nearBottom = ui.messages.scrollHeight - ui.messages.scrollTop - ui.messages.clientHeight < 120;
      ui.scrollLatestBtn.classList.toggle('visible', !nearBottom && ui.messages.childElementCount > 0);
    }

    function updateSearchNavigation(matchCount) {
      const hasSearch = Boolean(state.filters.searchTerm);
      const safeCount = Math.max(matchCount, 0);
      const activeIndex = safeCount > 0 ? Math.min(state.filters.matchIndex, safeCount - 1) : 0;
      state.filters.matchIndex = activeIndex;
      ui.searchMatchCount.textContent = hasSearch ? `${safeCount === 0 ? 0 : activeIndex + 1}/${safeCount}` : '0/0';
      ui.prevSearchMatchBtn.disabled = !hasSearch || safeCount <= 1;
      ui.nextSearchMatchBtn.disabled = !hasSearch || safeCount <= 1;
    }

    function moveSearchMatch(direction) {
      const chat = getSelectedChat();
      if (!chat || !state.filters.searchTerm) return;

      const filteredMessages = getFilteredMessages(chat);
      if (filteredMessages.length <= 1) return;

      const nextIndex = (state.filters.matchIndex + direction + filteredMessages.length) % filteredMessages.length;
      state.filters.matchIndex = nextIndex;
      renderSelectedChat();
      scrollToActiveSearchMatch();
    }

    function scrollToActiveSearchMatch() {
      if (!state.filters.searchTerm) return;
      const target = ui.messages.querySelector('.message-row.search-current');
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function parseLocalDate(datePart, timePart) {
      const dateParts = datePart.split(/[./]/).map((n) => parseInt(n, 10));
      let [day, month, year] = dateParts;
      if (year < 100) year += 2000;

      const timeParts = timePart.split(':').map((n) => parseInt(n, 10));
      const [hour, minute, second = 0] = timeParts;
      const date = new Date(year, month - 1, day, hour, minute, second);
      return Number.isNaN(date.getTime()) ? new Date().toISOString() : date.toISOString();
    }

    function renderChatList() {
      ui.chatList.innerHTML = '';
      const filter = state.chatListFilter.trim().toLocaleLowerCase('de-DE');
      const visibleChats = state.chats.filter((chat) => {
        if (!filter) return true;
        const haystack = [
          chat.title,
          ...getChatSenders(chat),
        ].join('\n').toLocaleLowerCase('de-DE');
        return haystack.includes(filter);
      });

      if (visibleChats.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'chat-list-empty';
        empty.textContent = filter
          ? 'Kein Chat passt zur aktuellen Suche.'
          : 'Noch keine Chats importiert. Starte links oben mit einem WhatsApp-Export.';
        ui.chatList.appendChild(empty);
        return;
      }

      for (const chat of visibleChats) {
        const item = document.createElement('article');
        item.className = `chat-item ${chat.id === state.selectedChatId ? 'active' : ''}`;
        const markerSeq = state.markerByChat[chat.id]?.seq;

        const openBtn = document.createElement('button');
        openBtn.type = 'button';
        openBtn.className = 'chat-open';
        const content = document.createElement('div');
        content.className = 'chat-open-content';
        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar';
        const icon = normalizeChatIcon(chat.chatIcon);
        if (icon) {
          avatar.style.backgroundImage = `url("${icon}")`;
          avatar.setAttribute('aria-hidden', 'true');
        } else {
          avatar.textContent = getChatInitials(chat.title);
          avatar.setAttribute('title', chat.title);
        }
        const textWrap = document.createElement('div');
        textWrap.className = 'chat-open-text';
        const title = document.createElement('h3');
        title.textContent = chat.title;
        const meta = document.createElement('p');
        const description = normalizeChatDescription(chat.description);
        meta.textContent = description || (markerSeq ? `Marker bei #${markerSeq}` : '');
        meta.title = description && markerSeq ? `${description} • Marker bei #${markerSeq}` : '';
        textWrap.appendChild(title);
        textWrap.appendChild(meta);
        content.appendChild(avatar);
        content.appendChild(textWrap);
        openBtn.appendChild(content);
        openBtn.addEventListener('click', async () => {
          await selectChat(chat.id);
          if (window.innerWidth <= 860) {
            closeSidebarPanel();
          }
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'chat-delete';
        deleteBtn.textContent = 'L\u00f6schen';
        deleteBtn.addEventListener('click', () => {
          deleteChat(chat.id).catch(console.error);
        });

        item.appendChild(openBtn);
        item.appendChild(deleteBtn);
        ui.chatList.appendChild(item);
      }
    }

    async function deleteChat(chatId) {
      const chat = state.chats.find((entry) => entry.id === chatId);
      if (!chat) return;

      if (!window.confirm(`Chat "${chat.title}" wirklich l\u00f6schen?`)) {
        return;
      }

      cleanupSessionMedia(chatId);
      await deletePersistedMediaForChat(chatId).catch(console.error);
      delete state.markerByChat[chatId];
      state.chats = state.chats.filter((entry) => entry.id !== chatId);

      if (state.selectedChatId === chatId) {
        state.selectedChatId = state.chats[0]?.id || null;
      }

      await persistAppState();
      renderChatList();

      if (state.selectedChatId) {
        await selectChat(state.selectedChatId);
      } else {
        renderSelectedChat();
      }
    }

    function cleanupSessionMedia(chatId) {
      const mediaIndex = state.sessionMediaByChat[chatId];
      if (!mediaIndex) return;

      const uniqueUrls = new Set(Object.values(mediaIndex));
      for (const url of uniqueUrls) {
        if (typeof url === 'string' && url.startsWith('blob:')) {
          URL.revokeObjectURL(url);
        }
      }

      delete state.sessionMediaByChat[chatId];
    }

    async function selectChat(chatId) {
      state.selectedChatId = chatId;
      state.filters.searchTerm = '';
      state.filters.matchIndex = 0;
      ui.messageSearchInput.value = '';
      ui.searchMatchCount.textContent = '0/0';
      ui.prevSearchMatchBtn.disabled = true;
      ui.nextSearchMatchBtn.disabled = true;
      ui.chatView.querySelector('.chat-header').classList.remove('show-controls');
      closeSidebarPanel();
      renderChatList();
      renderSelectedChat();
      requestAnimationFrame(() => {
        ui.messages.scrollTop = ui.messages.scrollHeight;
        syncScrollLatestButton();
      });
      await ensureChatMediaLoaded(chatId);
      if (state.selectedChatId === chatId) {
        renderSelectedChat();
        requestAnimationFrame(() => {
          ui.messages.scrollTop = ui.messages.scrollHeight;
          syncScrollLatestButton();
        });
      }
    }

    function openPeopleEditor() {
      const chat = getSelectedChat();
      if (!chat) return;

      const peopleGroups = buildPeopleEditorGroups(chat);
      ui.peopleList.innerHTML = '';

      const chatStyleRow = document.createElement('div');
      chatStyleRow.className = 'chat-style-row';
      const chatStyleLabel = document.createElement('div');
      chatStyleLabel.className = 'chat-style-label';
      chatStyleLabel.textContent = 'Chat-Hintergrund';
      const chatStyleControls = document.createElement('div');
      chatStyleControls.className = 'chat-style-controls';

      const backgroundInput = document.createElement('input');
      backgroundInput.className = 'person-color';
      backgroundInput.type = 'color';
      backgroundInput.value = normalizeChatBackground(state.globalDesign.backgroundColor) || '#000000';

    async function savePeopleEditor() {
      const chat = getSelectedChat();
      if (!chat) return;

      const senders = getAllSenders(state.chats);
      if (senders.length === 0) {
        alert('In diesem Chat wurden keine Namen gefunden.');
        return;
      }

      const renameMap = new Map();
      const nextColors = {};
      const rows = Array.from(ui.peopleList.querySelectorAll('.person-row'));
      const backgroundInput = ui.peopleList.querySelector('#chatBackgroundColorInput');
      const backgroundImageInput = ui.peopleList.querySelector('#chatBackgroundImageInput');
      const clearImageBtn = ui.peopleList.querySelector('#clearChatBackgroundImageBtn');
      const chatIconInput = ui.peopleList.querySelector('#chatIconInput');
      const clearIconBtn = ui.peopleList.querySelector('#clearChatIconBtn');
      const chatDescriptionInput = ui.peopleList.querySelector('#chatDescriptionInput');

      for (const row of rows) {
        const nameInput = row.querySelector('.person-input');
        const colorInput = row.querySelector('.person-color');
        const originalSenders = JSON.parse(nameInput?.dataset.originalSenders || '[]');
        const label = originalSenders.join(', ');
        const cleaned = nameInput?.value.trim() || '';

        if (!cleaned) {
          alert(`Bitte einen gueltigen Namen fuer "${label}" eintragen.`);
          nameInput?.focus();
          return;
        }

        for (const originalSender of originalSenders) {
          if (cleaned !== originalSender) {
            renameMap.set(originalSender, cleaned);
          }
        }

        nextColors[cleaned] = colorInput?.value || '#7fd0a0';
      }

      for (const existingChat of state.chats) {
        existingChat.messages = existingChat.messages.map((message) => ({
          ...message,
          sender: renameMap.get(message.sender) || message.sender,
        }));
        existingChat.updatedAt = new Date().toISOString();
      }
      const nextViewSender = renameMap.get(state.globalDesign.viewSender) || state.globalDesign.viewSender;
      state.globalDesign.senderColors = normalizeSenderColors(nextColors, getAllSenders(state.chats));
      state.globalDesign.viewSender = typeof nextViewSender === 'string' ? nextViewSender : '';
      state.globalDesign.backgroundColor = normalizeChatBackground(backgroundInput?.value);
      if (clearImageBtn?.dataset.clearImage === 'true') {
        state.globalDesign.backgroundImage = '';
      } else if (backgroundImageInput?.files?.[0]) {
        validateBackgroundImageFile(backgroundImageInput.files[0]);
        state.globalDesign.backgroundImage = normalizeChatBackgroundImage(await readFileAsDataUrl(backgroundImageInput.files[0]));
      } else {
        state.globalDesign.backgroundImage = normalizeChatBackgroundImage(state.globalDesign.backgroundImage);
      }
      chat.description = normalizeChatDescription(chatDescriptionInput?.value);
      if (clearIconBtn?.dataset.clearIcon === 'true') {
        chat.chatIcon = '';
      } else if (chatIconInput?.files?.[0]) {
        validateChatIconFile(chatIconInput.files[0]);
        chat.chatIcon = normalizeChatIcon(await readFileAsDataUrl(chatIconInput.files[0]));
      } else {
        chat.chatIcon = normalizeChatIcon(chat.chatIcon);
      }
      chat.updatedAt = new Date().toISOString();

      await persistAppState();
      closePeopleEditor();
      renderChatList();
      renderSelectedChat();
    }

    function renderFormattedMessage(target, text) {
      target.innerHTML = formatMessageText(text);
      highlightSearchMatches(target, state.filters.searchTerm);
    }

    function formatMessageText(text) {
      const codeTokens = [];
      let html = escapeHtml(text || '');

      html = html.replace(/```([\s\S]+?)```/g, (_, content) => {
        const token = `@@CODETOKEN${codeTokens.length}@@`;
        codeTokens.push(`<span class="text-code">${content}</span>`);
        return token;
      });

      html = html.replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');
      html = html.replace(/_([^_\n]+)_/g, '<em>$1</em>');

      for (let i = 0; i < codeTokens.length; i += 1) {
        html = html.replace(`@@CODETOKEN${i}@@`, codeTokens[i]);
      }

      return html;
    }

    function highlightSearchMatches(root, searchTerm) {
      if (!root || !searchTerm) return;

      const pattern = searchTerm.trim();
      if (!pattern) return;

      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue?.trim()) return NodeFilter.FILTER_REJECT;
          if (node.parentElement?.closest('.search-hit, .text-code')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        },
      });

      const textNodes = [];
      while (walker.nextNode()) {
        textNodes.push(walker.currentNode);
      }

      for (const node of textNodes) {
        const textValue = node.nodeValue;
        const lowerText = textValue.toLocaleLowerCase('de-DE');
        const lowerPattern = pattern.toLocaleLowerCase('de-DE');
        let matchIndex = lowerText.indexOf(lowerPattern);

        if (matchIndex === -1) continue;

        const fragment = document.createDocumentFragment();
        let cursor = 0;

        while (matchIndex !== -1) {
          if (matchIndex > cursor) {
            fragment.appendChild(document.createTextNode(textValue.slice(cursor, matchIndex)));
          }

          const mark = document.createElement('mark');
          mark.className = 'search-hit';
          mark.textContent = textValue.slice(matchIndex, matchIndex + pattern.length);
          fragment.appendChild(mark);

          cursor = matchIndex + pattern.length;
          matchIndex = lowerText.indexOf(lowerPattern, cursor);
        }

        if (cursor < textValue.length) {
          fragment.appendChild(document.createTextNode(textValue.slice(cursor)));
        }

        node.parentNode.replaceChild(fragment, node);
      }
    }

    function formatTime(iso) {
      const date = new Date(iso);
      return new Intl.DateTimeFormat('de-DE', {
        dateStyle: 'short',
        timeStyle: 'short',
      }).format(date);
