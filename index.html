    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function openMediaDb() {
      if (!('indexedDB' in window)) {
        return Promise.resolve(null);
      }

      return new Promise((resolve, reject) => {
        const req = indexedDB.open(mediaDbName, mediaDbVersion);

        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(mediaStoreName)) {
            const store = db.createObjectStore(mediaStoreName, { keyPath: 'id' });
            store.createIndex('chatId', 'chatId', { unique: false });
          }
          if (!db.objectStoreNames.contains(appStateStoreName)) {
            db.createObjectStore(appStateStoreName, { keyPath: 'id' });
          }
        };

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function persistMediaBlob(chatId, mediaKey, blob) {
      const db = await mediaDbPromise;
      if (!db) return;

      const normalizedKey = normalizeMediaKey(mediaKey);
      const id = `${chatId}|${normalizedKey}`;

      await new Promise((resolve, reject) => {
        const tx = db.transaction(mediaStoreName, 'readwrite');
        const store = tx.objectStore(mediaStoreName);
        store.put({
          id,
          chatId,
          mediaKey: normalizedKey,
          blob,
          updatedAt: Date.now(),
        });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('IndexedDB write aborted'));
      });
    }

    async function ensureChatMediaLoaded(chatId) {
      if (!chatId || state.sessionMediaByChat[chatId]) return;
      if (state.mediaLoadInFlight[chatId]) return state.mediaLoadInFlight[chatId];

      const loadPromise = (async () => {
        const db = await mediaDbPromise;
        if (!db) return;

        const records = await new Promise((resolve, reject) => {
          const tx = db.transaction(mediaStoreName, 'readonly');
          const store = tx.objectStore(mediaStoreName);
          const index = store.index('chatId');
          const req = index.getAll(IDBKeyRange.only(chatId));
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
        });

        if (!records.length) return;

        const mediaIndex = {};
        for (const record of records) {
          if (!record?.blob || !record?.mediaKey) continue;
          mediaIndex[record.mediaKey] = URL.createObjectURL(record.blob);
        }

        if (Object.keys(mediaIndex).length > 0) {
          cleanupSessionMedia(chatId);
          state.sessionMediaByChat[chatId] = mediaIndex;
        }
      })()
        .catch((error) => {
          console.error('Media load failed', error);
        })
        .finally(() => {
          delete state.mediaLoadInFlight[chatId];
        });

      state.mediaLoadInFlight[chatId] = loadPromise;
      return loadPromise;
    }

    async function deletePersistedMediaForChat(chatId) {
      const db = await mediaDbPromise;
      if (!db) return;

      await new Promise((resolve, reject) => {
        const tx = db.transaction(mediaStoreName, 'readwrite');
        const store = tx.objectStore(mediaStoreName);
        const index = store.index('chatId');
        const req = index.openKeyCursor(IDBKeyRange.only(chatId));

        req.onsuccess = () => {
          const cursor = req.result;
          if (!cursor) return;
          store.delete(cursor.primaryKey);
          cursor.continue();
        };

        req.onerror = () => reject(req.error);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('IndexedDB delete aborted'));
      });
    }

    async function clearPersistedMedia() {
      const db = await mediaDbPromise;

      await new Promise((resolve, reject) => {
        const tx = db.transaction(mediaStoreName, 'readwrite');
        const store = tx.objectStore(mediaStoreName);
        const req = store.clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('IndexedDB clear aborted'));
      });
    }

    async function loadPersistedState() {
      const db = await mediaDbPromise;
      if (db) {
        try {
          const record = await new Promise((resolve, reject) => {
            const tx = db.transaction(appStateStoreName, 'readonly');
            const store = tx.objectStore(appStateStoreName);
            const req = store.get(appStateRecordId);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => reject(req.error);
          });

          if (record?.data) {
            state.chats = normalizeChats(Array.isArray(record.data.chats) ? record.data.chats : []);
            state.markerByChat = record.data.markerByChat || {};
            state.globalDesign = normalizeGlobalDesign(record.data.globalDesign || deriveGlobalDesignFromChats(state.chats), state.chats);
            return;
          }

          const migrated = loadLegacyLocalState();
          if (migrated.chats.length || Object.keys(migrated.markerByChat).length) {
            state.chats = migrated.chats;
            state.markerByChat = migrated.markerByChat;
            state.globalDesign = migrated.globalDesign;
            await persistAppState();
            try {
              localStorage.removeItem(storageKey);
            } catch {}
            return;
          }
        } catch (error) {
          console.error('Persisted state load failed', error);
        }
      }

      const fallback = loadLegacyLocalState();
      state.chats = fallback.chats;
      state.markerByChat = fallback.markerByChat;
      state.globalDesign = fallback.globalDesign;
    }

    function loadLegacyLocalState() {
      let raw = null;
      try {
        raw = localStorage.getItem(storageKey);
      } catch {
        return { chats: [], markerByChat: {}, globalDesign: { ...defaultGlobalDesign } };
      }
      if (!raw) {
        return { chats: [], markerByChat: {}, globalDesign: { ...defaultGlobalDesign } };
      }

      try {
        const parsed = JSON.parse(raw);
        const chats = normalizeChats(Array.isArray(parsed.chats) ? parsed.chats : []);
        return {
          chats,
          markerByChat: parsed.markerByChat || {},
          globalDesign: normalizeGlobalDesign(parsed.globalDesign || deriveGlobalDesignFromChats(chats), chats),
        };
      } catch {
        return { chats: [], markerByChat: {}, globalDesign: { ...defaultGlobalDesign } };
      }
    }

    async function persistAppState() {
      const payload = {
        chats: state.chats,
        markerByChat: state.markerByChat,
        globalDesign: state.globalDesign,
      };

      const db = await mediaDbPromise;
      if (db) {
        await new Promise((resolve, reject) => {
          const tx = db.transaction(appStateStoreName, 'readwrite');
          const store = tx.objectStore(appStateStoreName);
          store.put({
            id: appStateRecordId,
            data: payload,
            updatedAt: Date.now(),
          });
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.onabort = () => reject(tx.error || new Error('IndexedDB state write aborted'));
        });

        try {
          localStorage.removeItem(storageKey);
        } catch {}
        return;
      }

      try {
        localStorage.setItem(storageKey, JSON.stringify(payload));
      } catch (error) {
        throw new Error(`Speichern fehlgeschlagen: ${error.message}`);
      }
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    async function exportArchiveFile() {
      validateChatsForPersistence(state.chats);
      validateMarkerState(state.markerByChat, state.chats);
      const mediaRecords = await listPersistedMediaRecords();
      const mediaAssets = [];

      for (const record of mediaRecords) {
        if (!record?.blob || !record?.chatId || !record?.mediaKey) continue;
        mediaAssets.push({
          chatId: record.chatId,
          mediaKey: record.mediaKey,
          dataUrl: await blobToDataUrl(record.blob),
        });
      }

      const archive = {
        version: 1,
        exportedAt: new Date().toISOString(),
        chats: state.chats,
        markerByChat: state.markerByChat,
        globalDesign: state.globalDesign,
        mediaAssets,
      };

      const fileName = `roleplay-archiv-${new Date().toISOString().slice(0, 10)}.json`;
      const blob = new Blob([JSON.stringify(archive, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function handleArchiveImportFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        showProgress({
          title: 'Archiv wird importiert',
          detail: `${file.name} wird gelesen...`,
          step: 'Datei lesen',
          percent: 8,
        });
        const raw = JSON.parse(await file.text());
        updateProgress({
          detail: 'Archivdaten werden geprueft...',
          step: 'Pruefen',
          percent: 22,
        });
        const archive = validateArchivePayload(raw);
        const chats = normalizeChats(archive.chats);
        const markerByChat = archive.markerByChat;
        const globalDesign = normalizeGlobalDesign(archive.globalDesign || deriveGlobalDesignFromChats(chats), chats);
        const mediaAssets = archive.mediaAssets;

        for (const chatId of Object.keys(state.sessionMediaByChat)) {
          cleanupSessionMedia(chatId);
        }

        updateProgress({
          detail: 'Vorhandene lokale Mediendaten werden ersetzt...',
          step: 'Zuruecksetzen',
          percent: 36,
        });
        await clearPersistedMedia();
        updateProgress({
          detail: 'Mediendateien werden lokal gespeichert...',
          step: 'Medien importieren',
          percent: mediaAssets.length === 0 ? 78 : 42,
        });
        const reportArchiveMediaProgress = createProgressReporter(42, 78, 'Medien importieren');
        let importedAssets = 0;
        for (const asset of mediaAssets) {
          const response = await fetch(asset.dataUrl);
          if (!response.ok) {
            throw new Error(`Mediendatei fuer Chat ${asset.chatId} konnte nicht gelesen werden.`);
          }
          const blob = await response.blob();
          await persistMediaBlob(asset.chatId, asset.mediaKey, blob);
          importedAssets += 1;
          reportArchiveMediaProgress(importedAssets, mediaAssets.length, `${importedAssets}/${mediaAssets.length} Mediendateien importiert`);
        }

        state.chats = chats;
        state.markerByChat = markerByChat;
        state.globalDesign = globalDesign;
        state.selectedChatId = chats[0]?.id || null;
        updateProgress({
          detail: 'Archivzustand wird lokal gespeichert...',
          step: 'Speichern',
          percent: 90,
        });
        await persistAppState();
        renderChatList();

        if (state.selectedChatId) {
          await selectChat(state.selectedChatId);
        } else {
          renderSelectedChat();
        }
        updateProgress({
          detail: `${file.name} wurde importiert.`,
          step: 'Abgeschlossen',
          percent: 100,
        });
      } catch (error) {
        console.error(error);
        alert(`Archiv-Import fehlgeschlagen: ${error.message}`);
      } finally {
        hideProgress();
        ui.archiveFileInput.value = '';
      }
    }

    function clampPercent(value) {
      return Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
    }

    function showProgress({ title = 'Import laeuft', detail = 'Bitte kurz warten.', step = 'Start', percent = 0, indeterminate = false } = {}) {
      ui.progressTitle.textContent = title;
      ui.progressOverlay.classList.add('open');
      ui.progressOverlay.setAttribute('aria-hidden', 'false');
      updateProgress({ detail, step, percent, indeterminate });
    }

    function updateProgress({ detail, step, percent, indeterminate = false } = {}) {
      if (typeof detail === 'string') {
        ui.progressDetail.textContent = detail;
      }
      if (typeof step === 'string') {
        ui.progressStep.textContent = step;
      }

      if (indeterminate) {
        ui.progressFill.classList.add('indeterminate');
        ui.progressFill.style.width = '';
        ui.progressPercent.textContent = '...';
        return;
      }

      const safePercent = clampPercent(percent);
      ui.progressFill.classList.remove('indeterminate');
      ui.progressFill.style.width = `${safePercent}%`;
      ui.progressPercent.textContent = `${safePercent}%`;
    }

    function hideProgress() {
      ui.progressOverlay.classList.remove('open');
      ui.progressOverlay.setAttribute('aria-hidden', 'true');
      ui.progressFill.classList.remove('indeterminate');
      ui.progressFill.style.width = '0%';
      ui.progressTitle.textContent = 'Import laeuft';
      ui.progressDetail.textContent = 'Bitte kurz warten.';
      ui.progressStep.textContent = 'Start';
      ui.progressPercent.textContent = '0%';
    }

    function createProgressReporter(startPercent, endPercent, stepLabel = 'Import') {
      const safeStart = clampPercent(startPercent);
      const safeEnd = clampPercent(endPercent);
      const span = Math.max(0, safeEnd - safeStart);

      return (current, total, detail = '') => {
        if (!Number.isFinite(total) || total <= 0) {
          updateProgress({
            step: stepLabel,
            detail: detail || 'Bitte kurz warten...',
            percent: safeEnd,
          });
          return;
        }

        const ratio = Math.max(0, Math.min(1, current / total));
        updateProgress({
          step: stepLabel,
          detail: detail || `${current}/${total}`,
          percent: safeStart + (span * ratio),
        });
      };
    }

    function validateChatsForPersistence(chats) {
      if (!Array.isArray(chats)) {
        throw new Error('Die Chats koennen nicht exportiert werden, weil die Archivdaten ungueltig sind.');
      }
      for (const chat of chats) {
        if (!chat?.id || !Array.isArray(chat.messages)) {
          throw new Error('Mindestens ein Chat ist unvollstaendig und kann nicht exportiert werden.');
        }
      }
    }

    function validateMarkerState(markerByChat, chats) {
      const validChatIds = new Set((chats || []).map((chat) => chat.id));
      for (const [chatId, marker] of Object.entries(markerByChat || {})) {
        if (!validChatIds.has(chatId)) continue;
        if (!marker || typeof marker.seq !== 'number') {
          throw new Error(`Der Marker fuer Chat ${chatId} ist ungueltig.`);
        }
      }
    }

    function validateArchivePayload(raw) {
      if (!raw || typeof raw !== 'object') {
        throw new Error('Die Archivdatei enthaelt kein gueltiges JSON-Objekt.');
      }
      if (!Array.isArray(raw.chats)) {
        throw new Error('In der Archivdatei fehlt die Chatliste.');
      }

      const chats = raw.chats.map((chat, index) => validateArchiveChat(chat, index));
      const markerByChat = validateArchiveMarkers(raw.markerByChat || {}, chats);
      const globalDesign = validateArchiveGlobalDesign(raw.globalDesign || {}, chats);
      const mediaAssets = validateArchiveMediaAssets(raw.mediaAssets || []);

      return { chats, markerByChat, globalDesign, mediaAssets };
    }

    function validateArchiveChat(chat, index) {
      if (!chat || typeof chat !== 'object') {
        throw new Error(`Chat #${index + 1} ist ungueltig.`);
      }
      if (!chat.id || typeof chat.id !== 'string') {
        throw new Error(`Chat #${index + 1} hat keine gueltige ID.`);
      }
      if (!Array.isArray(chat.messages)) {
        throw new Error(`Chat "${chat.title || chat.id}" enthaelt keine gueltige Nachrichtenliste.`);
      }

      const messages = chat.messages.map((message, messageIndex) => validateArchiveMessage(message, chat, messageIndex));
      return {
        ...chat,
        title: sanitizeChatTitle(chat.title) || 'Unbenannter Chat',
        description: normalizeChatDescription(chat.description),
        backgroundColor: normalizeChatBackground(chat.backgroundColor),
        backgroundImage: normalizeChatBackgroundImage(chat.backgroundImage),
        chatIcon: normalizeChatIcon(chat.chatIcon),
        messages,
      };
    }

    function validateArchiveMessage(message, chat, messageIndex) {
      if (!message || typeof message !== 'object') {
        throw new Error(`Nachricht #${messageIndex + 1} in Chat "${chat.title || chat.id}" ist ungueltig.`);
      }
      if (typeof message.sender !== 'string' || !message.sender.trim()) {
        throw new Error(`Nachricht #${messageIndex + 1} in Chat "${chat.title || chat.id}" hat keinen gueltigen Absender.`);
      }
      if (typeof message.seq !== 'number') {
        throw new Error(`Nachricht #${messageIndex + 1} in Chat "${chat.title || chat.id}" hat keine gueltige Reihenfolge.`);
      }
      if (!message.sentAt || Number.isNaN(new Date(message.sentAt).getTime())) {
        throw new Error(`Nachricht #${messageIndex + 1} in Chat "${chat.title || chat.id}" hat kein gueltiges Datum.`);
      }
      return {
        ...message,
        text: typeof message.text === 'string' ? message.text : '',
      };
    }

    function validateArchiveMarkers(markerByChat, chats) {
      if (!markerByChat || typeof markerByChat !== 'object' || Array.isArray(markerByChat)) {
        throw new Error('Die Marker-Daten im Archiv sind ungueltig.');
      }
      const validChatIds = new Set(chats.map((chat) => chat.id));
      const normalized = {};
      for (const [chatId, marker] of Object.entries(markerByChat)) {
        if (!validChatIds.has(chatId)) continue;
        if (!marker || typeof marker.seq !== 'number') {
          throw new Error(`Der Marker fuer Chat ${chatId} ist ungueltig.`);
        }
        normalized[chatId] = marker;
      }
      return normalized;
    }

    function validateArchiveGlobalDesign(globalDesign, chats) {
      if (!globalDesign || typeof globalDesign !== 'object' || Array.isArray(globalDesign)) {
        return normalizeGlobalDesign({}, chats);
      }
      return normalizeGlobalDesign(globalDesign, chats);
    }

    function validateArchiveMediaAssets(mediaAssets) {
      if (!Array.isArray(mediaAssets)) {
        throw new Error('Die Medienliste im Archiv ist ungueltig.');
      }
      return mediaAssets.map((asset, index) => {
        if (!asset?.chatId || !asset?.mediaKey || !asset?.dataUrl) {
          throw new Error(`Medienobjekt #${index + 1} ist unvollstaendig.`);
        }
        if (!/^data:/i.test(asset.dataUrl)) {
          throw new Error(`Medienobjekt #${index + 1} enthaelt kein gueltiges eingebettetes Medium.`);
        }
        return asset;
      });
    }
  </script>
